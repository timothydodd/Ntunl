{{define "content"}}
<div class="max-w-sm mx-auto mt-16 bg-white rounded-lg shadow p-8">
    <h1 class="text-2xl font-semibold mb-1">NTunl</h1>
    <p class="text-slate-500 mb-6 text-sm">Sign in to your account</p>
    <form method="post" action="/login" class="space-y-4">
        <div>
            <label class="block text-sm font-medium mb-1">Username</label>
            <input name="username" autofocus required
                   class="w-full rounded border border-slate-300 px-3 py-2 focus:outline-none focus:ring-2 focus:ring-slate-400">
        </div>
        <div>
            <label class="block text-sm font-medium mb-1">Password</label>
            <input name="password" type="password" required
                   class="w-full rounded border border-slate-300 px-3 py-2 focus:outline-none focus:ring-2 focus:ring-slate-400">
        </div>
        <button class="w-full rounded bg-slate-900 text-white py-2 font-medium hover:bg-slate-700">Sign in</button>
    </form>
</div>
{{end}}
