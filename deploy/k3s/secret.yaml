apiVersion: v1
kind: Secret
metadata:
  name: ntunl-host-admin
  namespace: ntunl
type: Opaque
# These seed the FIRST admin account (only applied when the database has no
# users). Change them before first deploy, then rotate via the portal.
# If you omit this Secret entirely, the host falls back to admin / admin.
stringData:
  NTUNL_ADMIN_USER: admin
  NTUNL_ADMIN_PASSWORD: change-me-now
